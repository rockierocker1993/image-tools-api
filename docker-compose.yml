services:
  image-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-tools-api
    # Run the container processes using the host UID/GID so files created in the bind-mounted
    # ./output-dir are owned by the host user and accessible via SFTP/FileZilla.
    # Load environment variables from an optional .env file at the repo root to allow
    # overriding Spring Boot properties and runtime settings when running docker-compose.
    env_file:
      - .env
    environment:
      # Java Options
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      LOCAL_UID: "${LOCAL_UID:-1000}"
      LOCAL_GID: "${LOCAL_GID:-1000}"
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: ["java", "-jar", "app.jar"]
    volumes:
      - ./data:/app/data:ro
      - ./output-dir:/app/output-dir
