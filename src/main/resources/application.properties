# CORS Configuration
# Gunakan * untuk allow semua origin, atau spesifik: http://localhost:3000,https://app.rockierocker.com
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
# Jika pakai credentials (cookie/Authorization header), set true dan allowed-origins TIDAK boleh *
cors.allow-credentials=false
cors.max-age=3600

enableWarmupEndpoint=false

