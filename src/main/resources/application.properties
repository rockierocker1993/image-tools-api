spring.application.name=image
server.servlet.context-path=/image-tools/api

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

#Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Max File Size Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Redis Pub/Sub Channel Names
redis.channel.job-upscaler-request=job-upscaler-request
redis.channel.job-upscaler-response=job-upscaler-response
redis.channel.job-rembg-request=job-rembg-request
redis.channel.job-rembg-response=job-rembg-response
redis.channel.job-vectorize-request=job-vectorize-request
redis.channel.job-vectorize-response=job-vectorize-response

# Model Remove Background Configuration
remove-bg.model=birefnet-general

# Preprocess Config Codes
remove-bg.preprocess-config-code=P_REMBG001
upscaler.preprocess-config-code=
vector.preprocess-config-code=P_VECTOR001

vector.config-code=VECTOR001

runpod.base-volume=/runpod-volume/
aws.s3.upload-temp.rembg=upload-temp-rembg
aws.s3.upload-temp.upscaler=upscale-temp-upload
aws.s3.upload-temp.vectorize=vectorize-temp-upload

minio.path.webp.rembg=image/rembg/webp
minio.path.result.rembg=image/rembg/result
minio.path.webp.upscaler=image/upscaler/webp
minio.path.result.upscaler=image/upscaler/result
minio.path.webp.vectorize=image/rembg/webp
minio.path.result.vectorize=image/vector/svg

# CORS Configuration
# Gunakan * untuk allow semua origin, atau spesifik: http://localhost:3000,https://app.rockierocker.com
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=false
cors.max-age=3600

enableWarmupEndpoint=false
allowed-image-extensions=png,jpg,jpeg

# Output directory configuration
# If not set, system temporary directory will be used
# Example: output.directory=C:/temp/image-processing
# Example: output.directory=/var/tmp/image-processing
output.directory=./output-dir
# Temporary files cleanup configuration
# Maximum age of temporary files in hours before deletion (default: 24)
temp.file.max.age.hours=24
# Enable/disable automatic cleanup of temporary files
temp.file.auto.cleanup.enabled=true
# Cleanup scheduler interval in minutes (default: 60)
temp.file.cleanup.interval.minutes=60

