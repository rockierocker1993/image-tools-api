spring.application.name=image
server.servlet.context-path=/image-tools/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://192.168.1.6:5432/imagetools
spring.datasource.username=rockierocker
spring.datasource.password=chelsea80
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

allowed-image-extensions=png,jpg,jpeg

# Output directory configuration
# If not set, system temporary directory will be used
# Example: output.directory=C:/temp/image-processing
# Example: output.directory=/var/tmp/image-processing
output.directory=./output-dir

# Temporary files cleanup configuration
# Maximum age of temporary files in hours before deletion (default: 24)
temp.file.max.age.hours=24

# Enable/disable automatic cleanup of temporary files
temp.file.auto.cleanup.enabled=true

# Cleanup scheduler interval in minutes (default: 60)
temp.file.cleanup.interval.minutes=60

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Redis Pub/Sub Channel Names
redis.channel.job-upscaler-request=job-upscaler-request
redis.channel.job-upscaler-response=job-upscaler-response
redis.channel.job-rembg-request=job-rembg-request
redis.channel.job-rembg-response=job-rembg-response

remove-bg.url=http://192.168.1.5:8000/remove-bg/birefnet-general
remove-bg.model=birefnet-general
remove-bg.preprocess-config-code=P_REMBG001
upscaler.preprocess-config-code=
vector.preprocess-config-code=P_VECTOR001
vector.config-code=VECTOR001

# Redis Configuration
spring.data.redis.host=192.168.1.6
spring.data.redis.port=6379
spring.data.redis.password=chelSEA80@123
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

runpod.base-volume=/runpod-volume/
aws.s3.upload-temp.rembg=upload-temp-rembg
aws.s3.upload-temp.upscaler=upscale-temp-upload

