spring.application.name=image

server.servlet.context-path=/image-tools/api

allowed-image-extensions=png,jpg,jpeg

# Database Configuration
spring.datasource.url=jdbc:postgresql://1.1.1.1:5432/imagetools
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# Output directory configuration
# If not set, system temporary directory will be used
# Example: output.directory=C:/temp/image-processing
# Example: output.directory=/var/tmp/image-processing
output.directory=./output-dir

# Temporary files cleanup configuration
# Maximum age of temporary files in hours before deletion (default: 24)
temp.file.max.age.hours=24

# Enable/disable automatic cleanup of temporary files
temp.file.auto.cleanup.enabled=true

# Cleanup scheduler interval in minutes (default: 60)
temp.file.cleanup.interval.minutes=60

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# AWS S3 Configuration
aws.s3.access-key=123user_3CqNPQfTtSFXIqNlEpOznvgoubO
aws.s3.secret-key=123rps_FSYB99526FQBRGZ2TTLNJUSU82BCBT7AY7CZ804G258xp3
aws.s3.region=is_region
aws.s3.bucket-name=123d9d2hffahi
aws.s3.endpoint-url=https://s3api-eur-is-1.runpod.io
# Presigned URL expiration in minutes (default: 60)
aws.s3.presigned-url-expiration-minutes=60

# MinIO Local S3 Configuration
minio.s3.access-key=YOUR_MINIO_ACCESS_KEY
minio.s3.secret-key=YOUR_MINIO_SECRET_KEY
minio.s3.region=us-east-1
minio.s3.endpoint-url=http://localhost:9000
minio.s3.bucket-name=imagetools
minio.s3.presigned-url-expiration-minutes=60

# WebSocket Configuration
# Allowed origins untuk WebSocket (gunakan domain spesifik di production)
websocket.allowed-origins=*

# Redis Pub/Sub Channel Names
redis.channel.job-upscaler-request=job-upscaler-request
redis.channel.job-upscaler-response=job-upscaler-response

redis.channel.job-rembg-request=job-rembg-request
redis.channel.job-rembg-response=job-rembg-response

remove-bg.url=http://192.168.1.5:8000/remove-bg/birefnet-general
remove-bg.model=birefnet-general

# Redis Configuration
spring.data.redis.host=11.11.1.6
spring.data.redis.port=6379
spring.data.redis.timeout=10s

spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5

aws.s3.upload-temp.rembg=upload-temp-rembg

# Redis key prefix untuk token autentikasi
# Format key di Redis: {prefix}{token}  contoh: auth:token:abc123
redis.key.token-prefix=auth:token:

# CORS Configuration
# Gunakan * untuk allow semua origin, atau spesifik: http://localhost:3000,https://app.rockierocker.com
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
# Jika pakai credentials (cookie/Authorization header), set true dan allowed-origins TIDAK boleh *
cors.allow-credentials=false
cors.max-age=3600

